<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Delete - Hospital Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .warning-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #dc3545;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .confirmation-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .patient-info {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .patient-info p {
            margin-bottom: 8px;
        }
        
        .patient-info strong {
            color: #333;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }
        
        .btn-cancel:hover {
            background-color: #5a6268;
        }
        
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-delete:hover {
            background-color: #c82333;
        }
        
        form {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠️</div>
        
        <h1>Confirm Deletion</h1>
        
        <div class="confirmation-message">
            <strong>⚠️ Warning!</strong> This action cannot be undone. Are you sure you want to delete this patient?
        </div>
        
        <div class="patient-info">
            <p><strong>Patient Name:</strong> {{ patient.name }}</p>
            <p><strong>Patient ID:</strong> {{ patient.id }}</p>
            <p><strong>Email:</strong> {{ patient.email }}</p>
            <p><strong>Mobile:</strong> {{ patient.mobile }}</p>
        </div>
        
        <div class="action-buttons">
            <form method="POST" style="flex: 1;">
                {% csrf_token %}
                <button type="submit" class="btn btn-delete" style="flex: 1;">🗑️ Delete Patient</button>
            </form>
            <a href="{% url 'patients:patient_list' %}" class="btn btn-cancel">Cancel</a>
        </div>
    </div>
</body>
</html>
